# NOTE: The GHCR image (ghcr.io/eni-ethereal-nexus/lumys-os) is not yet public.
# For now, build from source using `docker compose up --build`.
# See: https://github.com/ENI-Ethereal-Nexus-Institute/lumys-os/issues/12

version: "3.8"
services:
  lumys:
    build: .
    # image: ghcr.io/eni-ethereal-nexus/lumys-os:latest  # Uncomment when GHCR is public
    ports:
      - "4200:4200"
    volumes:
      - lumys-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    restart: unless-stopped

volumes:
  lumys-data:
